name: Design - Review Spec

on:
  workflow_dispatch:
    inputs:
      design_spec_file:
        description: Design spec filename to review
        required: true
        default: spec.md
        type: string

jobs:
  design-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure GitHub Auth
        run: |
          set -euo pipefail
          LOG_FILE=$(mktemp)
          exec > >(tee -a "$LOG_FILE") 2>&1
          trap 'EXIT_CODE=$?; echo "::group::Configure GitHub Auth failure output"; cat "$LOG_FILE"; echo "::endgroup::"; exit "$EXIT_CODE"' ERR

          echo "::notice::[on-design] Starting authentication setup"

          if [ -n "${{ secrets.COPILOT_GITHUB_TOKEN }}" ]; then
            echo "GH_TOKEN=${{ secrets.COPILOT_GITHUB_TOKEN }}" >> "$GITHUB_ENV"
            echo "::notice::[on-design] Using COPILOT_GITHUB_TOKEN"
          else
            echo "GH_TOKEN=${{ github.token }}" >> "$GITHUB_ENV"
            echo "::notice::[on-design] Using github.token"
          fi

          echo "::notice::[on-design] Authentication setup complete"

      - name: Run Design Review Agent
        run: |
          set -euo pipefail
          LOG_FILE=$(mktemp)
          exec > >(tee -a "$LOG_FILE") 2>&1
          trap 'EXIT_CODE=$?; echo "::group::Run Design Review Agent failure output"; cat "$LOG_FILE"; echo "::endgroup::"; exit "$EXIT_CODE"' ERR

          echo "::notice::[on-design] Starting design review workflow"

          DESIGN_SPEC_FILE="${{ inputs.design_spec_file }}"
          echo "::notice::[on-design] Input design spec file: $DESIGN_SPEC_FILE"
          if [ ! -f "$DESIGN_SPEC_FILE" ]; then
            echo "Design spec file not found: $DESIGN_SPEC_FILE"
            exit 1
          fi

          BASE_BRANCH="${{ github.ref_name }}"
          RUN_ID="${{ github.run_id }}"
          BRANCH_NAME="copilot/design-review-${RUN_ID}"

          echo "::notice::[on-design] Base branch: $BASE_BRANCH"
          echo "::notice::[on-design] Working branch: $BRANCH_NAME"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "::group::Create and prepare working branch"

          git pull
          git checkout -b "$BRANCH_NAME"
          echo "::endgroup::"

          PROMPT="Perform a design review of $DESIGN_SPEC_FILE and return new version with suggested changes. Only use spec.md as input and do not review other files in the repo"
          TMP_OUTPUT_FILE=$(mktemp)

          echo "::group::Run design review agent - $PROMPT on $DESIGN_SPEC_FILE"

          gh copilot --agent design-review-agent --prompt "$PROMPT" > "$TMP_OUTPUT_FILE"
          cat "$TMP_OUTPUT_FILE" > "$DESIGN_SPEC_FILE"
          echo "::endgroup::"

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes produced by design review; skipping commit and PR creation."
            exit 0
          fi

          echo "::group::Commit and push changes"

          git add -A
          git commit -m "docs: apply design review updates for $DESIGN_SPEC_FILE"
          git push --set-upstream origin "$BRANCH_NAME"
          echo "::endgroup::"

          echo "::group::Create pull request"

          gh pr create \
            --base "$BASE_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "Design review updates for $DESIGN_SPEC_FILE" \
            --body "Automated design review updates generated from $DESIGN_SPEC_FILE by design-review-agent."
          echo "::endgroup::"

          echo "::notice::[on-design] Design review workflow completed successfully"