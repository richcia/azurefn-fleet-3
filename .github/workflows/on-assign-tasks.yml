name: Assign Tasks

on:
  workflow_call:
    secrets:
      COPILOT_GITHUB_TOKEN:
        required: false
  workflow_dispatch:

jobs:
  assign-and-execute:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write

    env:
      COPILOT_PROMPT: >-
        1. Complete tasks in Issue's Description section, produce all artifacts in Outputs section, and ensure all criteria 
        in Acceptance Criteria is met
        2. Build and run all unit tests related to the task, ensure they pass and add new tests if needed to cover new code. 
        If tests are failing, fix the code until all tests pass.
        3. After all unit tests successfully pass, add "Ready for Review" label to the issue.
        4. If you encounter any blockers or need clarification, add "Blocked" label to the issue, ask for help in the issue 
        comments and wait for a response before proceeding.

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure GitHub Auth
        run: |
          set -euo pipefail
          if [ -n "${{ secrets.COPILOT_GITHUB_TOKEN }}" ] && false ; then
            echo "GH_TOKEN=${{ secrets.COPILOT_GITHUB_TOKEN }}" >> "$GITHUB_ENV"
            echo "Using COPILOT_GITHUB_TOKEN secret for authentication."
          else
            echo "GH_TOKEN=${{ github.token }}" >> "$GITHUB_ENV"
            echo "Using default GITHUB_TOKEN for authentication."
          fi

      - name: Query Code Ready Issues By Dependencies
        id: ready_issues
        run: |
          set -euo pipefail

          gh issue list --state all --limit 1000 --json number,title,body,state,url > all_issues.json

          declare -A TASK_STATE
          while IFS=$'\t' read -r task_id task_state; do
            [ -z "$task_id" ] && continue
            TASK_STATE["$task_id"]="$task_state"
          done < <(jq -r '
            .[]
            | select(.title | test("^\\[Task [^\\]]+\\]"))
            | (.title | capture("^\\[Task (?<id>[^\\]]+)\\]").id) + "\t" + .state
          ' all_issues.json)

          : > ready_issues.txt
          : > blocked_issues.txt

          while IFS= read -r issue_b64; do
            issue_json=$(printf "%s" "$issue_b64" | base64 --decode)
            issue_number=$(jq -r '.number' <<< "$issue_json")
            issue_title=$(jq -r '.title' <<< "$issue_json")
            issue_state=$(jq -r '.state' <<< "$issue_json")
            issue_body=$(jq -r '.body // ""' <<< "$issue_json")

            [ "$issue_state" != "OPEN" ] && continue

            depends_section=$(printf "%s\n" "$issue_body" | awk '
              BEGIN { in_dep = 0 }
              /^## Depends On[[:space:]]*$/ { in_dep = 1; next }
              /^##[[:space:]]+/ { if (in_dep) exit }
              { if (in_dep) print }
            ')

            deps=$(printf "%s\n" "$depends_section" \
              | sed -E 's/^\s*[-*]\s*//' \
              | sed -E 's/^\[ \]\s*//' \
              | sed -E 's/^\[x\]\s*//I' \
              | sed -E 's/^Task\s+//' \
              | sed -E 's/^\[Task\s+([^\]]+)\].*$/\1/' \
              | sed -E 's/\s+$//' \
              | sed -E '/^$/d' \
              | sed -E '/^None$/I d')

            ready=true
            missing_or_open=()
            if [ -n "$deps" ]; then
              while IFS= read -r dep; do
                [ -z "$dep" ] && continue
                dep_state="${TASK_STATE[$dep]:-MISSING}"
                if [ "$dep_state" != "CLOSED" ]; then
                  ready=false
                  missing_or_open+=("$dep")
                fi
              done <<< "$deps"
            fi

            if [ "$ready" = true ]; then
              echo "$issue_number" >> ready_issues.txt
            else
              echo "$issue_number\t${missing_or_open[*]}" >> blocked_issues.txt
            fi
          done < <(jq -r '.[] | @base64' all_issues.json)

          ready_count=$(wc -l < ready_issues.txt | tr -d ' ')
          echo "ready_count=$ready_count" >> "$GITHUB_OUTPUT"
          echo "Ready issues: $ready_count"

      - name: Assign Code Ready Issues To Copilot
        if: steps.ready_issues.outputs.ready_count != '0'
        run: |
          set -euo pipefail

          while IFS= read -r issue_number; do
            [ -z "$issue_number" ] && continue
            echo "Assigning issue #$issue_number to Copilot flow"

            already_assigned=false
            if gh issue view "$issue_number" --json assignees --jq '.assignees[]?.login' | grep -Eqi '^copilot$|^copilot\[bot\]$'; then
              already_assigned=true
            fi

            if [ "$already_assigned" = true ]; then
              echo "Issue #$issue_number is already assigned to copilot. Skipping assignment."
            else
              if gh issue edit "$issue_number" --add-assignee "@copilot" >/dev/null 2>&1; then
                echo "Assigned issue #$issue_number to copilot"
              else
                echo "Error: Could not assign issue #$issue_number to copilot."
                echo "::error title=Issue Assignment Failed::Could not assign issue #$issue_number to copilot"
                exit 1
              fi
              gh issue comment "$issue_number" --body "@copilot ${COPILOT_PROMPT}"              
            fi
          done < ready_issues.txt
          
