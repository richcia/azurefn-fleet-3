name: Design - Complete

on:
  push:
    paths:
      - spec.md
      
  workflow_dispatch:
    inputs:
      trigger_file:
        description: Path to the design file that triggered this workflow
        required: false
        default: spec.md
        type: string

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Initialize Run Context
        id: context
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S')

          echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "project_name=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "actor=${{ github.actor }}" >> $GITHUB_OUTPUT
          # Use workflow_dispatch input when present; otherwise default to spec.md for push runs
          TRIGGER_FILE="${{ inputs.trigger_file }}"
          if [ -z "$TRIGGER_FILE" ]; then
            TRIGGER_FILE="spec.md"
          fi
          echo "trigger_file=$TRIGGER_FILE" >> "$GITHUB_OUTPUT"

      - name: Initialize Audit Trail
        run: |
          mkdir -p results

          cat >> results/copilot-progress.md << 'EOF_AUDIT'

          ## Run: ${{ steps.context.outputs.run_id }} - ${{ steps.context.outputs.timestamp }}

          **Trigger:** workflow_dispatch - ${{ steps.context.outputs.trigger_file }}
          **Actor:** ${{ steps.context.outputs.actor }}
          **Branch:** ${{ steps.context.outputs.branch }} @ ${{ steps.context.outputs.sha }}
          **Project:** ${{ steps.context.outputs.project_name }}

          ### Stage Transitions

          **DESIGN** (${{ steps.context.outputs.timestamp }}): ✓ Complete
          - Design gate passed
          - Ready for PLAN stage

          EOF_AUDIT
        shell: bash

      - name: Prepare Task Plan File
        id: task_plan_file
        run: |
          set -euo pipefail
          PLAN_FILE_NAME="plan.json"
          rm -f "$PLAN_FILE_NAME"
          echo "plan_file_name=$PLAN_FILE_NAME" >> "$GITHUB_OUTPUT"

      - name: Invoke Task Planner Agent
        id: task_planner
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${COPILOT_GITHUB_TOKEN:-}" ] && [ -z "${GH_TOKEN:-}" ] && [ -z "${GITHUB_TOKEN:-}" ]; then
            echo "Missing authentication token for gh copilot."
            echo "Set repository/org secret COPILOT_GITHUB_TOKEN with a token that has Copilot access."
            exit 1
          fi

          TRIGGER_FILE="${{ steps.context.outputs.trigger_file }}"
          if [ ! -f "$TRIGGER_FILE" ]; then
            echo "Trigger file not found: $TRIGGER_FILE"
            exit 1
          fi

          PLAN_FILE_NAME="${{ steps.task_plan_file.outputs.plan_file_name }}"

          FILE_CONTENT=$(cat "$TRIGGER_FILE")
          PROMPT=$(cat <<EOF
          Create an implementation-ready engineering task plan from this design spec.
          Review input file: $TRIGGER_FILE
          output=json
          Use this exact output file name for the task plan: $PLAN_FILE_NAME
          Return the path to the generated plan file.
          Include all required engineering infrastructure tasks.

          $FILE_CONTENT
          EOF
          )

          GH_STDOUT_FILE=$(mktemp)
          GH_STDERR_FILE=$(mktemp)

          set +e
          gh copilot --agent task-planner-agent --prompt "$PROMPT" \
            > >(tee "$GH_STDOUT_FILE") \
            2> >(tee "$GH_STDERR_FILE" >&1)
          GH_EXIT_CODE=$?
          set -e

          RAW_OUTPUT=$(cat "$GH_STDOUT_FILE")

          if [ -s "$GH_STDERR_FILE" ]; then
            echo "gh copilot emitted stderr (mirrored to stdout above)."
          fi

          if [ "$GH_EXIT_CODE" -ne 0 ]; then
            echo "gh copilot failed with exit code $GH_EXIT_CODE"
            exit "$GH_EXIT_CODE"
          fi

          PLAN_FILE="$PLAN_FILE_NAME"
          REPORTED_PLAN_FILE=$(printf "%s" "$RAW_OUTPUT" | tr -d '\r' | grep -Eo '(^|[[:space:]])[^[:space:]]*plan\.json([[:space:]]|$)' | head -1 | xargs)
          if [ -n "$REPORTED_PLAN_FILE" ] && [ "$REPORTED_PLAN_FILE" != "$PLAN_FILE_NAME" ]; then
            echo "Planner reported different plan file path ($REPORTED_PLAN_FILE); expected $PLAN_FILE_NAME."
          fi

          if [ ! -f "$PLAN_FILE" ]; then
            echo "Error: Task Planner Agent did not produce expected plan file: $PLAN_FILE"
            echo "Agent output was:"
            printf "%s\n" "$RAW_OUTPUT"
            exit 1
          fi

          RESULT=$(cat "$PLAN_FILE")

          printf "%s" "$RESULT" | jq -e . >/dev/null
          printf "%s" "$RESULT" | jq -e '.tasks and (.tasks | type == "array")' >/dev/null

          mkdir -p results
          printf "%s\n" "$RESULT" > results/task-plan.json

          {
            echo "plan_file=results/task-plan.json"
            echo "result<<EOF"
            echo "$RESULT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Issues From Task Plan
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PLAN_FILE="${{ steps.task_planner.outputs.plan_file }}"
          if [ -z "$PLAN_FILE" ] || [ ! -f "$PLAN_FILE" ]; then
            echo "Task plan file not found: $PLAN_FILE"
            exit 1
          fi

          jq -c '.tasks[]' "$PLAN_FILE" | while read -r task; do
            TASK_ID=$(jq -r '.id' <<< "$task")
            TASK_TITLE=$(jq -r '.title' <<< "$task")
            ISSUE_TITLE="[Task ${TASK_ID}] ${TASK_TITLE}"

            EXISTING_COUNT=$(gh issue list --state all --search "\"${ISSUE_TITLE}\" in:title" --json title --jq 'length')
            if [ "$EXISTING_COUNT" -gt 0 ]; then
              echo "Issue already exists for ${TASK_ID}; skipping."
              continue
            fi

            ISSUE_BODY=$(jq -r '
              [
                "## Task Metadata",
                "- ID: " + .id,
                "- Type: " + .type,
                "- Estimate: " + .estimate,
                "- Owner Role: " + .owner_role,
                "- Parallelizable: " + (if .parallelizable then "Yes" else "No" end),
                "",
                "## Description",
                .description,
                "",
                "## Inputs",
                (if (.inputs | length) > 0 then (.inputs | map("- " + .) | join("\n")) else "- None" end),
                "",
                "## Outputs",
                (if (.outputs | length) > 0 then (.outputs | map("- " + .) | join("\n")) else "- None" end),
                "",
                "## Depends On",
                (if (.depends_on | length) > 0 then (.depends_on | map("- " + .) | join("\n")) else "- None" end),
                "",
                "## Acceptance Criteria",
                (if (.acceptance_criteria | length) > 0 then (.acceptance_criteria | map("- [ ] " + .) | join("\n")) else "- [ ] None specified" end),
                "",
                "## Risks",
                (if (.risks | length) > 0 then (.risks | map("- " + .) | join("\n")) else "- None noted" end)
              ] | join("\n")
            ' <<< "$task")

            gh issue create \
              --title "$ISSUE_TITLE" \
              --body "$ISSUE_BODY"
          done


      - name: Commit Audit Trail
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A results/copilot-progress.md ${{ steps.task_planner.outputs.plan_file }}
          git commit -m "chore: pipeline run ${{ steps.context.outputs.run_id }} planned" || true
          git push
