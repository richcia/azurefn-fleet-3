name: Integration - Staging

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  integration:
    name: Run staging integration test
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Run staging integration test
        env:
          RUN_INTEGRATION_TESTS: "true"
          INTEGRATION_ALLOW_DESTRUCTIVE_BLOB_CLEANUP: "true"
          INTEGRATION_DELETE_EXISTING_BLOBS_BEFORE_INVOKE: "true"
          INTEGRATION_DELETE_CREATED_BLOB: "true"
          AZURE_FUNCTIONAPP_NAME: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          TRAPI_ENDPOINT: ${{ secrets.STAGING_TRAPI_ENDPOINT }}
          TRAPI_DEPLOYMENT_NAME: ${{ secrets.STAGING_TRAPI_DEPLOYMENT_NAME }}
          TRAPI_API_VERSION: ${{ secrets.STAGING_TRAPI_API_VERSION }}
          DATA_STORAGE_ACCOUNT_NAME: ${{ secrets.STAGING_DATA_STORAGE_ACCOUNT_NAME }}
        run: |
          python -m pytest tests/integration/test_roster_integration.py -v -m integration
