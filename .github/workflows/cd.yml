name: CD

on:
  push:
    branches:
      - main

permissions:
  id-token: write   # Required for OIDC token acquisition
  contents: read

jobs:
  deploy:
    name: Test, deploy to staging, smoke test, and swap
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: pip install -r requirements.txt

      - name: Run pytest unit tests
        run: python -m pytest tests/ -v

      - name: Install production dependencies
        run: |
          pip install \
            --target=".python_packages/lib/site-packages" \
            -r requirements-prod.txt

      - name: Create deployment zip package
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "tests/*" \
            --exclude ".github/*" \
            --exclude "infra/*" \
            --exclude "local.settings.json*" \
            --exclude "*.md" \
            --exclude "coverage.xml" \
            --exclude "deploy.zip" \
            --exclude '*__pycache__*' \
            --exclude '*.pyc'

      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy zip package to staging slot
        uses: azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          slot-name: staging
          package: deploy.zip

      - name: Smoke test staging slot endpoint
        run: |
          STAGING_URL="https://${{ secrets.AZURE_FUNCTIONAPP_NAME }}-staging.azurewebsites.net"
          STATUS_CODE="$(curl -sS -o /dev/null -w "%{http_code}" "$STAGING_URL")"
          case "$STATUS_CODE" in
            200|204|302|401|403|404)
              echo "Smoke test passed with HTTP $STATUS_CODE from $STAGING_URL"
              ;;
            *)
              echo "Smoke test failed with HTTP $STATUS_CODE from $STAGING_URL"
              exit 1
              ;;
          esac

      - name: Swap staging slot to production
        uses: azure/cli@v2
        with:
          inlineScript: |
            RESOURCE_GROUP="$(az resource list --name "${{ secrets.AZURE_FUNCTIONAPP_NAME }}" --resource-type "Microsoft.Web/sites" --query "[0].resourceGroup" -o tsv)"
            if [ -z "$RESOURCE_GROUP" ]; then
              echo "Unable to determine resource group for ${{ secrets.AZURE_FUNCTIONAPP_NAME }}"
              exit 1
            fi

            az functionapp deployment slot swap \
              --name "${{ secrets.AZURE_FUNCTIONAPP_NAME }}" \
              --resource-group "$RESOURCE_GROUP" \
              --slot staging \
              --target-slot production
