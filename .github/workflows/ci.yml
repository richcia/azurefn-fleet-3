name: CI - Unit Tests

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install gitleaks
        run: |
          GOBIN=/tmp/gobin go install github.com/zricethezav/gitleaks/v8@v8.30.1

      - name: Scan full git history for secrets
        run: |
          /tmp/gobin/gitleaks git --no-banner --redact --exit-code 1 .

  test:
    name: pytest with coverage
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate host.json APP-06 settings
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          host = json.loads(Path("host.json").read_text())
          assert host.get("functionTimeout") == "00:02:00", "functionTimeout must be 00:02:00"
          assert host.get("logging", {}).get("applicationInsights", {}).get("samplingSettings", {}).get("isEnabled") is True, "samplingSettings.isEnabled must be true"
          assert host.get("logging", {}).get("applicationInsights", {}).get("samplingSettings", {}).get("excludedTypes") == "Request;Exception", "samplingSettings.excludedTypes must be Request;Exception"
          assert host.get("extensions", {}).get("timerTrigger", {}).get("maxConcurrentCalls") == 1, "extensions.timerTrigger.maxConcurrentCalls must be 1"
          PY

      - name: Run pytest with coverage
        run: |
          python -m pytest tests/ -v -m "not integration" \
            --cov=function_app \
            --cov=blob_writer \
            --cov=trapi_client \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
