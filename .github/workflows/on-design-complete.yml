name: Design - Complete

on:
  push:
    paths:
      - spec.md
      
  workflow_dispatch:
    inputs:
      trigger_file:
        description: Path to the design file that triggered this workflow
        required: false
        default: spec.md
        type: string

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Initialize Run Context
        id: context
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S')

          echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "project_name=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "actor=${{ github.actor }}" >> $GITHUB_OUTPUT
          # Use workflow_dispatch input when present; otherwise default to spec.md for push runs
          TRIGGER_FILE="${{ inputs.trigger_file }}"
          if [ -z "$TRIGGER_FILE" ]; then
            TRIGGER_FILE="spec.md"
          fi
          echo "trigger_file=$TRIGGER_FILE" >> "$GITHUB_OUTPUT"

      - name: Initialize Audit Trail
        run: |
          mkdir -p results

          cat >> results/copilot-progress.md << 'EOF_AUDIT'

          ## Run: ${{ steps.context.outputs.run_id }} - ${{ steps.context.outputs.timestamp }}

          **Trigger:** workflow_dispatch - ${{ steps.context.outputs.trigger_file }}
          **Actor:** ${{ steps.context.outputs.actor }}
          **Branch:** ${{ steps.context.outputs.branch }} @ ${{ steps.context.outputs.sha }}
          **Project:** ${{ steps.context.outputs.project_name }}

          ### Stage Transitions

          **DESIGN** (${{ steps.context.outputs.timestamp }}): ✓ Complete
          - Design gate passed
          - Ready for PLAN stage

          EOF_AUDIT
        shell: bash

      - name: Invoke Task Planner Agent
        id: task_planner
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        working-directory: ${{ github.workspace }}
        run: |
          cd "$GITHUB_WORKSPACE"
          pwd
          ls -la

          set -euo pipefail

          if [ -z "${COPILOT_GITHUB_TOKEN:-}" ] && [ -z "${GH_TOKEN:-}" ] && [ -z "${GITHUB_TOKEN:-}" ]; then
            echo "Missing authentication token for gh copilot."
            echo "Set repository/org secret COPILOT_GITHUB_TOKEN with a token that has Copilot access."
            exit 1
          fi

          TRIGGER_FILE="${{ steps.context.outputs.trigger_file }}"
          if [ ! -f "$TRIGGER_FILE" ]; then
            echo "Trigger file not found: $TRIGGER_FILE"
            exit 1
          fi

          FILE_CONTENT=$(cat "$TRIGGER_FILE")
          PROMPT=$(cat <<EOF
          Create an implementation-ready engineering task plan from this design spec.
          Review input file: $TRIGGER_FILE
          output=json
          Return strict JSON only to stdout following the Task Planner Agent schema.
          Include all required engineering infrastructure tasks.

          $FILE_CONTENT
          EOF
          )

          GH_STDOUT_FILE="results/task-plan.json"
          GH_STDERR_FILE=$(mktemp)

          set +e
          gh copilot --agent task-planner-agent --prompt "$PROMPT" > "$GH_STDOUT_FILE" 2> >(tee "$GH_STDERR_FILE" >&2)
          GH_EXIT_CODE=$?
          set -e

          if [ "$GH_EXIT_CODE" -ne 0 ]; then
            echo "gh copilot failed with exit code $GH_EXIT_CODE"
            echo "See $GH_STDERR_FILE for details"
            exit "$GH_EXIT_CODE"
          fi

          # Strip markdown code fences if the agent wrapped output despite instructions
          RAW_OUTPUT=$(cat "$GH_STDOUT_FILE")
          RAW_OUTPUT2=$(printf "%s" "$RAW_OUTPUT" | sed '/^```/d')
          RAW_OUTPUT2=$(printf "%s" "$RAW_OUTPUT2" | perl -0pe 's/^[^{]*//s; s/[^}]*$//s')
          printf "%s\n" "$RAW_OUTPUT2" > "$GH_STDOUT_FILE"

          JQ_ERROR_FILE=$(mktemp)
          RESULT=$(printf "%s" "$RAW_OUTPUT2" | jq -e . 2>"$JQ_ERROR_FILE" || true)
          if [ -z "$RESULT" ]; then
            echo "Error: Could not parse JSON output from Task Planner Agent after stripping markdown fences."
            echo "jq parse error:"
            cat "$JQ_ERROR_FILE"
            echo "Agent output was:"
            printf "%s\n" "$RAW_OUTPUT2"
            exit 1
          fi
          echo "Task Planner Agent output successfully parsed."

          mkdir -p results
          printf "%s\n" "$RESULT" > results/task-plan.json

          {
            echo "result<<EOF"
            echo "$RESULT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          

      - name: Create GitHub Issues From Task Plan
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PLAN_FILE="results/task-plan.json"
          if [ -z "$PLAN_FILE" ] || [ ! -f "$PLAN_FILE" ]; then
            echo "Task plan file not found: $PLAN_FILE"
            exit 1
          fi

          echo "Reading task plan from $PLAN_FILE"
          echo "PLAN_FILE contents:"; cat "$PLAN_FILE"

          # Create a GitHub Milestone for each wave and build a number lookup map
          declare -A MILESTONE_NUMBER_MAP
          while IFS= read -r wave; do
            [ -z "$wave" ] && continue
            echo "Ensuring milestone exists for wave: $wave"
            EXISTING=$(gh api "repos/${{ github.repository }}/milestones" \
              --jq ".[] | select(.title == \"$wave\") | .number" 2>/dev/null || true)
            if [ -n "$EXISTING" ]; then
              MILESTONE_NUMBER_MAP["$wave"]="$EXISTING"
              echo "Using existing milestone '$wave': #$EXISTING"
            else
              CREATED=$(gh api "repos/${{ github.repository }}/milestones" \
                --method POST -f title="$wave" -f state="open" \
                --jq '.number' 2>/dev/null || true)
              if [ -n "$CREATED" ]; then
                MILESTONE_NUMBER_MAP["$wave"]="$CREATED"
                echo "Created milestone '$wave': #$CREATED"
              else
                echo "Warning: Could not create milestone for wave '$wave'"
              fi
            fi
          done < <(jq -r '[.tasks[].wave // empty] | unique | .[]' "$PLAN_FILE")

          # Use process substitution (not pipe) so MILESTONE_NUMBER_MAP remains in scope
          while read -r task; do
            TASK_ID=$(jq -r '.id' <<< "$task")
            echo "Processing task: $TASK_ID"
            TASK_TITLE=$(jq -r '.title' <<< "$task")
            TASK_TYPE=$(jq -r '.type // ""' <<< "$task")
            echo "Task title: $TASK_TITLE"
            ISSUE_TITLE="[Task ${TASK_ID}] ${TASK_TITLE}"
            echo "Issue title: $ISSUE_TITLE"

            ISSUE_STATE="open"
            echo "Task type: ${TASK_TYPE:-unknown}; target issue state: $ISSUE_STATE"

            LABELS=$(jq -r '(.labels // [])[]' <<< "$task")
            LABEL_ARGS=()
            if [ -n "$LABELS" ]; then
              while IFS= read -r label; do
                [ -z "$label" ] && continue
                # Ensure label exists so gh issue create does not fail.
                gh label create "$label" --color "0E8A16" --description "Task plan label" >/dev/null 2>&1 || true
                LABEL_ARGS+=(--label "$label")
              done <<< "$LABELS"
            fi

            EXISTING_COUNT=$(gh issue list --state all --search "\"${ISSUE_TITLE}\" in:title" --json title --jq 'length')
            if [ "$EXISTING_COUNT" -gt 0 ]; then
              echo "Issue already exists for ${TASK_ID}; skipping."
              continue
            fi

            ISSUE_BODY=$(jq -r '
              [
                "## Task Metadata",
                "- ID: " + .id,
                "- Type: " + .type,
                "- Estimate: " + .estimate,
                "- Owner Role: " + .owner_role,
                "- Parallelizable: " + (if .parallelizable then "Yes" else "No" end),
                "",
                "## Description",
                .description,
                "",
                "## Inputs",
                (if (.inputs | length) > 0 then (.inputs | map("- " + .) | join("\n")) else "- None" end),
                "",
                "## Outputs",
                (if (.outputs | length) > 0 then (.outputs | map("- " + .) | join("\n")) else "- None" end),
                "",
                "## Depends On",
                (if (.depends_on | length) > 0 then (.depends_on | map("- " + .) | join("\n")) else "- None" end),
                "",
                "## Acceptance Criteria",
                (if (.acceptance_criteria | length) > 0 then (.acceptance_criteria | map("- [ ] " + .) | join("\n")) else "- [ ] None specified" end),
                "",
                "## Risks",
                (if (.risks | length) > 0 then (.risks | map("- " + .) | join("\n")) else "- None noted" end)
              ] | join("\n")
            ' <<< "$task")

            WAVE=$(jq -r '.wave // ""' <<< "$task")
            MILESTONE_ARG=()
            if [ -n "$WAVE" ] && [ -n "${MILESTONE_NUMBER_MAP[$WAVE]:-}" ]; then
              MILESTONE_ARG=(--milestone "${WAVE}")
              echo "Assigning task ${TASK_ID} to milestone '${WAVE}' (#${MILESTONE_NUMBER_MAP[$WAVE]})"
            fi

            echo "Creating issue for task ${TASK_ID}..."

            CREATED_ISSUE=$(gh issue create \
              --title "$ISSUE_TITLE" \
              --body "$ISSUE_BODY" \
              "${LABEL_ARGS[@]}" \
              "${MILESTONE_ARG[@]}")

            if [ "$ISSUE_STATE" = "closed" ]; then
              gh issue close "$CREATED_ISSUE" >/dev/null
              echo "Closed issue for non-app task ${TASK_ID}."
            fi
          done < <(jq -c '.tasks[]' "${PLAN_FILE}")


      - name: Commit Audit Trail
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A results/copilot-progress.md results/task-plan.json
          git commit -m "chore: pipeline run ${{ steps.context.outputs.run_id }} planned" || true
          git push
