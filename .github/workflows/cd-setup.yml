name: CD Setup

on:
  workflow_dispatch:
    inputs:
      azure_subscription_id:
        description: Azure subscription ID used by deployment workflows
        required: true
        type: string
      azure_tenant_id:
        description: Microsoft Entra tenant ID
        required: true
        type: string
      bootstrap_client_id:
        description: Existing bootstrap app client ID allowed to manage app registrations
        required: true
        type: string
      app_registration_name:
        description: Display name for the GitHub Actions OIDC app registration
        required: true
        default: github-actions-oidc-azurefn-fleet-3
        type: string
      federated_credential_name:
        description: Federated credential name (must be unique per app registration)
        required: true
        default: github-oidc-main
        type: string
      subject_type:
        description: GitHub OIDC subject type for trust policy
        required: true
        default: branch
        type: choice
        options:
          - branch
          - environment
      subject_value:
        description: Branch name (for branch) or environment name (for environment)
        required: true
        default: main
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  setup-oidc:
    name: Provision OIDC app and federated credential
    runs-on: ubuntu-latest

    steps:
      - name: Log in to Azure via bootstrap OIDC identity
        uses: azure/login@v2
        with:
          client-id: ${{ inputs.bootstrap_client_id }}
          tenant-id: ${{ inputs.azure_tenant_id }}
          subscription-id: ${{ inputs.azure_subscription_id }}

      - name: Create or update app registration, service principal, and federated identity credential
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail

            APP_NAME='${{ inputs.app_registration_name }}'
            FID_NAME='${{ inputs.federated_credential_name }}'
            SUBJECT_TYPE='${{ inputs.subject_type }}'
            SUBJECT_VALUE='${{ inputs.subject_value }}'
            REPOSITORY='${{ github.repository }}'

            if [ "$SUBJECT_TYPE" = "branch" ]; then
              SUBJECT="repo:${REPOSITORY}:ref:refs/heads/${SUBJECT_VALUE}"
            elif [ "$SUBJECT_TYPE" = "environment" ]; then
              SUBJECT="repo:${REPOSITORY}:environment:${SUBJECT_VALUE}"
            else
              echo "Unsupported subject type: $SUBJECT_TYPE"
              exit 1
            fi

            APP_MATCH_COUNT="$(az ad app list --display-name "$APP_NAME" --query "length(@)" -o tsv)"
            if [ "$APP_MATCH_COUNT" -gt 1 ]; then
              echo "Multiple app registrations found with display name '$APP_NAME'."
              echo "Use a unique app_registration_name to keep setup deterministic."
              exit 1
            fi

            APP_ID="$(az ad app list --display-name "$APP_NAME" --query "[0].appId" -o tsv)"
            if [ "$APP_MATCH_COUNT" -eq 0 ] || [ -z "$APP_ID" ]; then
              APP_ID="$(az ad app create --display-name "$APP_NAME" --sign-in-audience AzureADMyOrg --query appId -o tsv)"
              echo "Created app registration: $APP_NAME"
            else
              echo "Reusing existing app registration: $APP_NAME"
            fi

            APP_OBJECT_ID="$(az ad app show --id "$APP_ID" --query id -o tsv)"

            SP_ID="$(az ad sp list --filter "appId eq '$APP_ID'" --query "[0].id" -o tsv)"
            if [ -z "$SP_ID" ]; then
              SP_ID="$(az ad sp create --id "$APP_ID" --query id -o tsv)"
              echo "Created service principal for app registration."
            else
              echo "Reusing existing service principal."
            fi

            EXISTING_FID_ID="$(az ad app federated-credential list --id "$APP_OBJECT_ID" --query "[?name=='$FID_NAME'].id | [0]" -o tsv)"
            cat > /tmp/federated-credential.json <<EOF
            {
              "name": "$FID_NAME",
              "issuer": "https://token.actions.githubusercontent.com",
              "subject": "$SUBJECT",
              "description": "GitHub Actions OIDC trust for ${REPOSITORY}",
              "audiences": [
                "api://AzureADTokenExchange"
              ]
            }
            EOF

            if [ -n "$EXISTING_FID_ID" ]; then
              az ad app federated-credential update \
                --id "$APP_OBJECT_ID" \
                --federated-credential-id "$EXISTING_FID_ID" \
                --parameters /tmp/federated-credential.json >/dev/null
              echo "Updated existing federated credential '$FID_NAME'."
            else
              az ad app federated-credential create --id "$APP_OBJECT_ID" --parameters /tmp/federated-credential.json >/dev/null
              echo "Created federated credential '$FID_NAME'."
            fi

            {
              echo "### CD Setup completed"
              echo "- App registration name: \`$APP_NAME\`"
              echo "- AZURE_CLIENT_ID: \`$APP_ID\`"
              echo "- AZURE_TENANT_ID: \`${{ inputs.azure_tenant_id }}\`"
              echo "- AZURE_SUBSCRIPTION_ID: \`${{ inputs.azure_subscription_id }}\`"
              echo "- Federated credential name: \`$FID_NAME\`"
              echo "- Subject: \`$SUBJECT\`"
              echo ""
              echo "Set these repository secrets after this run:" 
              echo "- \`AZURE_CLIENT_ID\` = $APP_ID"
              echo "- \`AZURE_TENANT_ID\` = ${{ inputs.azure_tenant_id }}"
              echo "- \`AZURE_SUBSCRIPTION_ID\` = ${{ inputs.azure_subscription_id }}"
            } >> "$GITHUB_STEP_SUMMARY"
