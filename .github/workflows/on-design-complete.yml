name: Design - Complete

on:
  push:
    paths:
      - spec.md
      
  workflow_dispatch:
    inputs:
      trigger_file:
        description: Path to the design file that triggered this workflow
        required: false
        default: spec.md
        type: string

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Initialize Run Context
        id: context
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S')

          echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "project_name=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "actor=${{ github.actor }}" >> $GITHUB_OUTPUT
          # Use workflow_dispatch input when present; otherwise default to spec.md for push runs
          TRIGGER_FILE="${{ inputs.trigger_file }}"
          if [ -z "$TRIGGER_FILE" ]; then
            TRIGGER_FILE="spec.md"
          fi
          echo "trigger_file=$TRIGGER_FILE" >> "$GITHUB_OUTPUT"

      - name: Initialize Audit Trail
        run: |
          mkdir -p results

          cat >> results/copilot-progress.md << 'EOF_AUDIT'

          ## Run: ${{ steps.context.outputs.run_id }} - ${{ steps.context.outputs.timestamp }}

          **Trigger:** workflow_dispatch - ${{ steps.context.outputs.trigger_file }}
          **Actor:** ${{ steps.context.outputs.actor }}
          **Branch:** ${{ steps.context.outputs.branch }} @ ${{ steps.context.outputs.sha }}
          **Project:** ${{ steps.context.outputs.project_name }}

          ### Stage Transitions

          **DESIGN** (${{ steps.context.outputs.timestamp }}): ✓ Complete
          - Design gate passed
          - Ready for PLAN stage

          EOF_AUDIT
        shell: bash

      - name: Invoke Task Planner Agent
        id: task_planner
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${COPILOT_GITHUB_TOKEN:-}" ] && [ -z "${GH_TOKEN:-}" ] && [ -z "${GITHUB_TOKEN:-}" ]; then
            echo "Missing authentication token for gh copilot."
            echo "Set repository/org secret COPILOT_GITHUB_TOKEN with a token that has Copilot access."
            exit 1
          fi

          TRIGGER_FILE="${{ steps.context.outputs.trigger_file }}"
          if [ ! -f "$TRIGGER_FILE" ]; then
            echo "Trigger file not found: $TRIGGER_FILE"
            exit 1
          fi

          FILE_CONTENT=$(cat "$TRIGGER_FILE")
          PROMPT=$(cat <<EOF
          Create an implementation-ready engineering task plan from this design spec.
          Review input file: $TRIGGER_FILE
          output=json
          Return strict JSON only following the Task Planner Agent schema.
          Include all required engineering infrastructure tasks.
          Write all error messages and warnings to stderr and stdout, but ensure the JSON output is only the valid JSON plan.

          $FILE_CONTENT
          EOF
          )

          GH_STDOUT_FILE=$(mktemp)
          GH_STDERR_FILE=$(mktemp)

          set +e
          gh copilot --agent task-planner-agent --prompt "Respond to this following prompt in JSON format: $PROMPT" \
            > >(tee "$GH_STDOUT_FILE") \
            2> >(tee "$GH_STDERR_FILE" >&1)
          GH_EXIT_CODE=$?
          set -e

          RAW_OUTPUT=$(cat "$GH_STDOUT_FILE")

          if [ -s "$GH_STDERR_FILE" ]; then
            echo "gh copilot emitted stderr (mirrored to stdout above)."
          fi

          if [ "$GH_EXIT_CODE" -ne 0 ]; then
            echo "gh copilot failed with exit code $GH_EXIT_CODE"
            exit "$GH_EXIT_CODE"
          fi

          RESULT=$(printf "%s" "$RAW_OUTPUT" | jq -s '.[0]' 2>/dev/null || \
            printf "%s" "$RAW_OUTPUT" | sed -n '/{/,/^}/p' | head -1)

          if [ -z "$RESULT" ]; then
            echo "Error: Could not extract valid JSON from gh copilot output."
            echo "Raw output:"
            printf "%s" "$RAW_OUTPUT"
            exit 1
          fi

          printf "%s" "$RESULT" | jq -e . >/dev/null
          printf "%s" "$RESULT" | jq -e '.tasks and (.tasks | type == "array")' >/dev/null

          mkdir -p results
          printf "%s\n" "$RESULT" > results/task-plan.json

          {
            echo "result<<EOF"
            echo "$RESULT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"


      - name: Commit Audit Trail
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A results/copilot-progress.md results/task-plan.json
          git commit -m "chore: pipeline run ${{ steps.context.outputs.run_id }} planned" || true
          git push
