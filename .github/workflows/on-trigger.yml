name: Trigger - Initialize Pipeline Run

on:
  push:
    paths:
      - spec.md

jobs:
  check-invocation:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      should-trigger: ${{ steps.detect.outputs.should-trigger }}
      prompt: ${{ steps.detect.outputs.prompt }}
    steps:
      - name: Detect Invocation Pattern
        id: detect
        run: |
          echo "should-trigger=true" >> $GITHUB_OUTPUT
          echo "prompt=spec.md updated in commit ${{ github.sha }}" >> $GITHUB_OUTPUT

  trigger:
    needs: check-invocation
    if: needs.check-invocation.outputs.should-trigger == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Initialize Run Context
        id: context
        run: |
          SPEC_NAME=$(awk '
            /^### Name[[:space:]]*$/ {
              while (getline line) {
                if (line ~ /^[[:space:]]*$/) continue
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", line)
                print line
                exit
              }
            }
          ' spec.md 2>/dev/null)

          if [ -n "$SPEC_NAME" ]; then
            SAFE_SPEC_NAME=$(echo "$SPEC_NAME" | tr -cs '[:alnum:]._-' '-')
            SAFE_SPEC_NAME=${SAFE_SPEC_NAME#-}
            SAFE_SPEC_NAME=${SAFE_SPEC_NAME%-}
            PROJECT_NAME="$SAFE_SPEC_NAME"
          else
            PROJECT_NAME="${PROJECT_TYPE}_${TIMESTAMP}"
          fi
          RUN_ID="${PROJECT_NAME}_$(date +%s)"
          TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S')
          PROJECT_TYPE=$(head -1 project-type.md 2>/dev/null || echo "DefaultProject")
          
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "actor=${{ github.actor }}" >> $GITHUB_OUTPUT
          echo "run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Initialize Audit Trail
        id: audit
        run: |
          mkdir -p results
          
          cat >> results/copilot-progress.md << 'EOF'
          
          ## Run: ${{ steps.context.outputs.run_id }} - ${{ steps.context.outputs.timestamp }}
          
          **Trigger:** ${{ needs.check-invocation.outputs.prompt }}
          **Actor:** ${{ steps.context.outputs.actor }}
          **Branch:** ${{ steps.context.outputs.branch }} @ ${{ steps.context.outputs.sha }}
          **Workflow URL:** ${{ steps.context.outputs.run_url }}
          **Project:** ${{ steps.context.outputs.project_name }}
          
          ### Stage Transitions
          
          **TRIGGER** (${{ steps.context.outputs.timestamp }}): ✓ Complete
          - Initialized run context
          - Created GitHub Project: ${{ steps.context.outputs.project_name }}
          - Ready for DESIGN stage
          
          EOF
        shell: bash

      - name: Trigger Design Review Agent
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        id: design_review
        run: |
          set -euo pipefail

          if [ -z "${COPILOT_GITHUB_TOKEN:-}" ] && [ -z "${GH_TOKEN:-}" ] && [ -z "${GITHUB_TOKEN:-}" ]; then
            echo "Missing authentication token for gh copilot."
            echo "Set repository/org secret COPILOT_GITHUB_TOKEN with a token that has Copilot access."
            exit 1
          fi
                  
          SPEC_CONTENT=$(cat spec.md)
          PROMPT=$(cat <<EOF
          Review input file: spec.md
          output=json
          Return strict JSON only.
          Include an updated_spec field containing the full rewritten spec.md text with all critical and major recommendations applied inline throughout the document.

          $SPEC_CONTENT
          EOF
          )

          GH_STDOUT_FILE=$(mktemp)
          GH_STDERR_FILE=$(mktemp)

          set +e
          gh copilot --agent design-review-agent --prompt "Respond to this following prompt in JSON format: $PROMPT" \
            > >(tee "$GH_STDOUT_FILE") \
            2> >(tee "$GH_STDERR_FILE" >&1)
          GH_EXIT_CODE=$?
          set -e

          RAW_OUTPUT=$(cat "$GH_STDOUT_FILE")

          if [ -s "$GH_STDERR_FILE" ]; then
            echo "gh copilot emitted stderr (mirrored to stdout above)."
          fi

          if [ "$GH_EXIT_CODE" -ne 0 ]; then
            echo "gh copilot failed with exit code $GH_EXIT_CODE"
            exit "$GH_EXIT_CODE"
          fi

          # Extract only the JSON object portion (gh copilot may append diagnostic text).
          # Use jq to parse the first valid JSON object and discard trailing diagnostics.
          RESULT=$(printf "%s" "$RAW_OUTPUT" | jq -s '.[0]' 2>/dev/null || \
            printf "%s" "$RAW_OUTPUT" | sed -n '/{/,/^}/p' | head -1)

          if [ -z "$RESULT" ]; then
            echo "Error: Could not extract valid JSON from gh copilot output."
            echo "Raw output:"
            printf "%s" "$RAW_OUTPUT"
            exit 1
          fi

          # Ensure extracted JSON is valid.
          printf "%s" "$RESULT" | jq -e . >/dev/null

          mkdir -p results
          printf "%s\n" "$RESULT" > results/design-review.json

          {
            echo "result<<EOF"
            echo "$RESULT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create/Update Design Review Issue
        run: |
          TITLE="DESIGN:${{ steps.context.outputs.project_name }}"
          RESULT="$DESIGN_RESULT"
          RESULT_JSON=$(printf "%s" "$RESULT" | jq -c .)

          CRITICAL_COUNT=$(printf "%s" "$RESULT_JSON" | jq -r 'if (.critical_count // null) != null then .critical_count else ([.findings[]? | select((.severity // "") | ascii_downcase == "critical")] | length) end')
          MAJOR_COUNT=$(printf "%s" "$RESULT_JSON" | jq -r '.major_count // ([.findings[]? | select((.severity // "") | ascii_downcase == "major")] | length)')
          MINOR_COUNT=$(printf "%s" "$RESULT_JSON" | jq -r '.minor_count // ([.findings[]? | select((.severity // "") | ascii_downcase == "minor")] | length)')
          SUMMARY=$(printf "%s" "$RESULT_JSON" | jq -r '.summary // "No summary provided."')

          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            HAS_CRITICAL=true
          else
            HAS_CRITICAL=false
          fi

          PR_URL=""
          if [ "$HAS_CRITICAL" = true ]; then
            BRANCH_NAME="fix/design-review-$(echo "${{ steps.context.outputs.run_id }}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')"

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b "$BRANCH_NAME"

            UPDATED_SPEC=$(printf "%s" "$RESULT_JSON" | jq -r '.updated_spec // empty')
            if [ -n "$UPDATED_SPEC" ]; then
              printf "%s\n" "$UPDATED_SPEC" > spec.md
            else
              {
                printf "\n\n## Required Changes (Critical Findings — Auto-generated)\n\n"
                printf "%s" "$RESULT_JSON" | jq -r '.findings[]? | select((.severity // "") | ascii_downcase == "critical") | "### \(.title)\n\n**Component:** \(.component)\n\n**Evidence:** \(.evidence)\n\n**Recommendation:** \(.recommendation)\n"'
              } >> spec.md
            fi

            git add spec.md
            git commit -m "fix: apply critical design review recommendations (${{ steps.context.outputs.run_id }})"
            git push origin "$BRANCH_NAME"

            PR_BODY_FILE=$(mktemp)
            {
              echo "## Critical Design Review Findings"
              echo
              echo "This PR applies recommendations from the automated design review."
              echo
              echo "**Run:** ${{ steps.context.outputs.run_url }}"
              echo "**Project:** ${{ steps.context.outputs.project_name }}"
              echo
              echo "### Critical Findings ($CRITICAL_COUNT)"
              echo
              printf "%s" "$RESULT_JSON" | jq -r '.findings[]? | select((.severity // "") | ascii_downcase == "critical") | "#### \(.title)\n\n**Evidence:** \(.evidence)\n\n**Recommendation:** \(.recommendation)\n"'
            } > "$PR_BODY_FILE"

            PR_URL=$(gh pr create \
              --title "fix: resolve $CRITICAL_COUNT critical design review findings (${{ steps.context.outputs.project_name }})" \
              --body-file "$PR_BODY_FILE" \
              --base "${{ github.ref_name }}" \
              --head "$BRANCH_NAME")

            git checkout "${{ github.ref_name }}"
          fi

          BODY_FILE=$(mktemp)
          {
            echo "# Design Review Results"
            echo
            echo "Project: ${{ steps.context.outputs.project_name }}"
            echo "Run: ${{ steps.context.outputs.run_url }}"
            echo "Commit: ${{ steps.context.outputs.sha }}"
            echo "Critical: $CRITICAL_COUNT | Major: $MAJOR_COUNT | Minor: $MINOR_COUNT"
            if [ -n "$PR_URL" ]; then
              echo "PR: $PR_URL"
            fi
            echo
            echo "## Summary"
            echo
            printf "%s\n" "$SUMMARY"
            echo
            echo "## Agent Output"
            echo
            echo '```json'
            printf "%s\n" "$RESULT_JSON" | jq .
            echo '```'
            echo
            if [ "$HAS_CRITICAL" = true ]; then
              echo "## Required Next Action"
              echo
              if [ -n "$PR_URL" ]; then
                echo "A pull request with recommended changes has been opened: $PR_URL"
                echo
              fi
              echo "Resolve all critical findings in spec.md, commit, and push to trigger another review cycle."
            else
              echo "## Status"
              echo
              echo "No critical findings. This issue can be marked complete."
            fi
          } > "$BODY_FILE"

          ISSUE_NUMBER=$(gh issue list --state all --json number,title --jq '.[] | select(.title == "'"$TITLE"'") | .number' | head -n 1)

          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue edit "$ISSUE_NUMBER" --title "$TITLE" --body-file "$BODY_FILE"
          else
            ISSUE_URL=$(gh issue create --title "$TITLE" --body-file "$BODY_FILE")
            ISSUE_NUMBER="${ISSUE_URL##*/}"
          fi

          if [ "$HAS_CRITICAL" = true ]; then
            gh issue reopen "$ISSUE_NUMBER" || true
            COMMENT="Critical findings detected ($CRITICAL_COUNT critical). Resolve all critical findings in spec.md and push to initiate another review."
            if [ -n "$PR_URL" ]; then
              COMMENT="$COMMENT A pull request with recommended changes has been opened: $PR_URL"
            fi
            gh issue comment "$ISSUE_NUMBER" --body "$COMMENT"
          else
            gh issue close "$ISSUE_NUMBER" --comment "No critical findings detected in the latest design review. Marking complete."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DESIGN_RESULT: ${{ steps.design_review.outputs.result }}

      - name: Commit Audit Trail
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A results/copilot-progress.md results/design-review.json
          git commit -m "chore: pipeline run ${{ steps.context.outputs.run_id }} initialized" || true
          git push
