name: Cleanup Pipeline Artifacts

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type DELETE to confirm destructive cleanup
        required: true
        default: ""
        type: string

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - name: Confirm Destructive Action
        run: |
          if [ "${{ inputs.confirm }}" != "DELETE" ]; then
            echo "Confirmation failed. Set input 'confirm' to DELETE."
            exit 1
          fi

      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Delete All GitHub Issues
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            export GH_TOKEN="$GITHUB_TOKEN"
          fi

          ISSUES=$(gh issue list --state all --limit 1000 --json number --jq '.[].number')

          if [ -z "$ISSUES" ]; then
            echo "No issues found."
          else
            for issue in $ISSUES; do
              echo "Deleting issue #$issue"
              gh issue delete "$issue" --yes
            done
          fi

      - name: Delete All GitHub Milestones
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            export GH_TOKEN="$GITHUB_TOKEN"
          fi

          MILESTONES=$(gh api "repos/${{ github.repository }}/milestones?state=all&per_page=100" --jq '.[].number')

          if [ -z "$MILESTONES" ]; then
            echo "No milestones found."
          else
            for milestone in $MILESTONES; do
              echo "Deleting milestone #$milestone"
              gh api "repos/${{ github.repository }}/milestones/$milestone" --method DELETE >/dev/null
            done
          fi

      - name: Close All Open Pull Requests
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            export GH_TOKEN="$GITHUB_TOKEN"
          fi

          gh pr list --state open --limit 1000 --json number,headRefName,headRepositoryOwner,headRepository \
            > all_open_prs.json

          PRS=$(jq -r '.[].number' all_open_prs.json)

          if [ -z "$PRS" ]; then
            echo "No open pull requests found."
          else
            while IFS= read -r pr_number; do
              [ -z "$pr_number" ] && continue

              head_ref=$(jq -r --argjson pr "$pr_number" '.[] | select(.number == $pr) | .headRefName' all_open_prs.json)
              head_repo_owner=$(jq -r --argjson pr "$pr_number" '.[] | select(.number == $pr) | .headRepositoryOwner.login // ""' all_open_prs.json)
              head_repo_name=$(jq -r --argjson pr "$pr_number" '.[] | select(.number == $pr) | .headRepository.name // ""' all_open_prs.json)

              echo "Closing pull request #$pr_number"
              gh pr close "$pr_number" --delete-branch || gh pr close "$pr_number"

              if [ -n "$head_ref" ] \
                && [ "$head_repo_owner" = "${{ github.repository_owner }}" ] \
                && [ "$head_repo_name" = "${{ github.event.repository.name }}" ]; then
                echo "Deleting branch $head_ref"
                gh api "repos/${{ github.repository }}/git/refs/heads/$head_ref" --method DELETE >/dev/null || true
              fi
            done <<< "$PRS"
          fi

      - name: Delete All Files In results
        run: |
          set -euo pipefail

          mkdir -p results
          find results -mindepth 1 -delete

      - name: Delete All Files In src
        run: |
          set -euo pipefail

          if [ -d "src" ]; then
            find src -mindepth 1 -delete
          fi

      - name: Delete All Files In infra
        run: |
          set -euo pipefail

          if [ -d "infra" ]; then
            find infra -mindepth 1 -delete
          fi

      - name: Delete All Files In tests
        run: |
          set -euo pipefail

          if [ -d "tests" ]; then
            find tests -mindepth 1 -delete
          fi

      - name: Delete CI.yml and CD.yml workflows
        run: |
          set -euo pipefail

          if [ -f ".github/workflows/CI.yml" ]; then
            rm -f .github/workflows/CI.yml
          fi
          if [ -f ".github/workflows/CD.yml" ]; then
            rm -f .github/workflows/CD.yml
          fi

      - name: Commit Cleanup Changes
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A results
          git commit -m "chore: cleanup design pipeline artifacts" || true
          git push
