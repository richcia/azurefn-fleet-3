name: Plan - Generate Plan for Agents

on:
  push:
    paths:
      - spec.md
      
  workflow_dispatch:
    inputs:
      trigger_file:
        description: Path to the design file that triggered this workflow
        required: false
        default: spec.md
        type: string
      assign_tasks_after_plan:
        description: Trigger on-assign-tasks.yml after plan completion
        required: false
        default: true
        type: boolean

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      issues: write
      repository-projects: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Initialize Run Context
        id: context
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S')

          echo "run_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "project_name=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "actor=${{ github.actor }}" >> $GITHUB_OUTPUT
          # Use workflow_dispatch input when present; otherwise default to spec.md for push runs
          TRIGGER_FILE="${{ inputs.trigger_file }}"
          if [ -z "$TRIGGER_FILE" ]; then
            TRIGGER_FILE="spec.md"
          fi
          echo "trigger_file=$TRIGGER_FILE" >> "$GITHUB_OUTPUT"

      - name: Initialize Audit Trail
        run: |
          mkdir -p results

          cat >> results/copilot-progress.md << 'EOF_AUDIT'

          ## Run: ${{ steps.context.outputs.run_id }} - ${{ steps.context.outputs.timestamp }}

          **Trigger:** workflow_dispatch - ${{ steps.context.outputs.trigger_file }}
          **Actor:** ${{ steps.context.outputs.actor }}
          **Branch:** ${{ steps.context.outputs.branch }} @ ${{ steps.context.outputs.sha }}
          **Project:** ${{ steps.context.outputs.project_name }}

          ### Stage Transitions

          **DESIGN** (${{ steps.context.outputs.timestamp }}): ✓ Complete
          - Design gate passed
          - Ready for PLAN stage

          EOF_AUDIT
        shell: bash

      - name: Invoke Task Planner Agent
        id: task_planner
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        working-directory: ${{ github.workspace }}
        run: |
          cd "$GITHUB_WORKSPACE"
          pwd
          ls -la

          set -euo pipefail

          if [ -z "${COPILOT_GITHUB_TOKEN:-}" ] && [ -z "${GH_TOKEN:-}" ] && [ -z "${GITHUB_TOKEN:-}" ]; then
            echo "Missing authentication token for gh copilot."
            echo "Set repository/org secret COPILOT_GITHUB_TOKEN with a token that has Copilot access."
            exit 1
          fi

          TRIGGER_FILE="${{ steps.context.outputs.trigger_file }}"
          if [ ! -f "$TRIGGER_FILE" ]; then
            echo "Trigger file not found: $TRIGGER_FILE"
            exit 1
          fi

          FILE_CONTENT=$(cat "$TRIGGER_FILE")
          PROMPT=$(cat <<EOF
          Create an implementation-ready engineering task plan from this design spec.
          Review input file: $TRIGGER_FILE
          output=json
          Return strict JSON only to stdout following the Task Planner Agent schema.
          Include all required engineering infrastructure tasks.

          $FILE_CONTENT
          EOF
          )

          GH_STDOUT_FILE="results/task-plan.json"
          GH_STDERR_FILE=$(mktemp)

          set +e
          gh copilot --agent task-planner-agent --prompt "$PROMPT" > "$GH_STDOUT_FILE" 2> >(tee "$GH_STDERR_FILE" >&2)
          GH_EXIT_CODE=$?
          set -e

          if [ "$GH_EXIT_CODE" -ne 0 ]; then
            echo "gh copilot failed with exit code $GH_EXIT_CODE"
            echo "See $GH_STDERR_FILE for details"
            exit "$GH_EXIT_CODE"
          fi

          # Strip markdown code fences if the agent wrapped output despite instructions
          RAW_OUTPUT=$(cat "$GH_STDOUT_FILE")
          RAW_OUTPUT2=$(printf "%s" "$RAW_OUTPUT" | sed '/^```/d')
          RAW_OUTPUT2=$(printf "%s" "$RAW_OUTPUT2" | perl -0pe 's/^[^{]*//s; s/[^}]*$//s')
          printf "%s\n" "$RAW_OUTPUT2" > "$GH_STDOUT_FILE"

          JQ_ERROR_FILE=$(mktemp)
          RESULT=$(printf "%s" "$RAW_OUTPUT2" | jq -e . 2>"$JQ_ERROR_FILE" || true)
          if [ -z "$RESULT" ]; then
            echo "Error: Could not parse JSON output from Task Planner Agent after stripping markdown fences."
            echo "jq parse error:"
            cat "$JQ_ERROR_FILE"
            echo "Agent output was:"
            printf "%s\n" "$RAW_OUTPUT2"
            exit 1
          fi
          echo "Task Planner Agent output successfully parsed."

          mkdir -p results
          printf "%s\n" "$RESULT" > results/task-plan.json

          {
            echo "result<<EOF"
            echo "$RESULT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          

      - name: Create GitHub Issues From Task Plan
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PLAN_FILE="results/task-plan.json"
          if [ -z "$PLAN_FILE" ] || [ ! -f "$PLAN_FILE" ]; then
            echo "Task plan file not found: $PLAN_FILE"
            exit 1
          fi

          echo "Reading task plan from $PLAN_FILE"
          echo "PLAN_FILE contents:"; cat "$PLAN_FILE"

          # Create a GitHub Milestone for each wave and build a number lookup map
          declare -A MILESTONE_NUMBER_MAP
          while IFS= read -r wave; do
            [ -z "$wave" ] && continue
            echo "Ensuring milestone exists for wave: $wave"
            EXISTING=$(gh api "repos/${{ github.repository }}/milestones" \
              --jq ".[] | select(.title == \"$wave\") | .number" 2>/dev/null || true)
            if [ -n "$EXISTING" ]; then
              MILESTONE_NUMBER_MAP["$wave"]="$EXISTING"
              echo "Using existing milestone '$wave': #$EXISTING"
            else
              CREATED=$(gh api "repos/${{ github.repository }}/milestones" \
                --method POST -f title="$wave" -f state="open" \
                --jq '.number' 2>/dev/null || true)
              if [ -n "$CREATED" ]; then
                MILESTONE_NUMBER_MAP["$wave"]="$CREATED"
                echo "Created milestone '$wave': #$CREATED"
              else
                echo "Warning: Could not create milestone for wave '$wave'"
              fi
            fi
          done < <(jq -r '[.tasks[].wave // empty] | unique | .[]' "$PLAN_FILE")

          # Use process substitution (not pipe) so MILESTONE_NUMBER_MAP remains in scope
          while read -r task; do
            TASK_ID=$(jq -r '.id' <<< "$task")
            echo "Processing task: $TASK_ID"
            TASK_TITLE=$(jq -r '.title' <<< "$task")
            TASK_TYPE=$(jq -r '.type // ""' <<< "$task")
            echo "Task title: $TASK_TITLE"
            ISSUE_TITLE="[Task ${TASK_ID}] ${TASK_TITLE}"
            echo "Issue title: $ISSUE_TITLE"

            ISSUE_STATE="open"
            echo "Task type: ${TASK_TYPE:-unknown}; target issue state: $ISSUE_STATE"

            LABELS=$(jq -r '(.labels // [])[]' <<< "$task")
            LABEL_ARGS=()
            if [ -n "$LABELS" ]; then
              while IFS= read -r label; do
                [ -z "$label" ] && continue
                # Ensure label exists so gh issue create does not fail.
                gh label create "$label" --color "0E8A16" --description "Task plan label" >/dev/null 2>&1 || true
                LABEL_ARGS+=(--label "$label")
              done <<< "$LABELS"
            fi

            EXISTING_COUNT=$(gh issue list --state all --search "\"${ISSUE_TITLE}\" in:title" --json title --jq 'length')
            if [ "$EXISTING_COUNT" -gt 0 ]; then
              echo "Issue already exists for ${TASK_ID}; skipping."
              continue
            fi

            ISSUE_BODY=$(jq -r '
              [
                "## Task Metadata",
                "- ID: " + .id,
                "- Type: " + .type,
                "- Estimate: " + .estimate,
                "- Owner Role: " + .owner_role,
                "- Parallelizable: " + (if .parallelizable then "Yes" else "No" end),
                "",
                "## Description",
                .description,
                "",
                "## Inputs",
                (if (.inputs | length) > 0 then (.inputs | map("- " + .) | join("\n")) else "- None" end),
                "",
                "## Outputs",
                (if (.outputs | length) > 0 then (.outputs | map("- " + .) | join("\n")) else "- None" end),
                "",
                "## Depends On",
                (if (.depends_on | length) > 0 then (.depends_on | map("- " + .) | join("\n")) else "- None" end),
                "",
                "## Dependency Graph",
                (if ((.dependency_graph // "") | tostring | length) > 0 then ((.dependency_graph | tostring) | split("\n") | map("- " + .) | join("\n")) else "- None" end),
                "",
                "## Acceptance Criteria",
                (if (.acceptance_criteria | length) > 0 then (.acceptance_criteria | map("- [ ] " + .) | join("\n")) else "- [ ] None specified" end),
                "",
                "## Risks",
                (if (.risks | length) > 0 then (.risks | map("- " + .) | join("\n")) else "- None noted" end)
              ] | join("\n")
            ' <<< "$task")

            WAVE=$(jq -r '.wave // ""' <<< "$task")
            MILESTONE_ARG=()
            if [ -n "$WAVE" ] && [ -n "${MILESTONE_NUMBER_MAP[$WAVE]:-}" ]; then
              MILESTONE_ARG=(--milestone "${WAVE}")
              echo "Assigning task ${TASK_ID} to milestone '${WAVE}' (#${MILESTONE_NUMBER_MAP[$WAVE]})"
            fi

            echo "Creating issue for task ${TASK_ID}..."

            CREATED_ISSUE=$(gh issue create \
              --title "$ISSUE_TITLE" \
              --body "$ISSUE_BODY" \
              "${LABEL_ARGS[@]}" \
              "${MILESTONE_ARG[@]}")

            if [ "$ISSUE_STATE" = "closed" ]; then
              gh issue close "$CREATED_ISSUE" >/dev/null
              echo "Closed issue for non-app task ${TASK_ID}."
            fi
          done < <(jq -c '.tasks[]' "${PLAN_FILE}")

      - name: Create Project Board and Add Repository Issues
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN || github.token }}
        run: |
          set -euo pipefail

          SPEC_FILE="${{ steps.context.outputs.trigger_file }}"
          if [ ! -f "$SPEC_FILE" ]; then
            echo "Spec file not found: $SPEC_FILE"
            exit 1
          fi

          PROJECT_TITLE=$(awk '
            /^### Name[[:space:]]*$/ {
              while (getline > 0) {
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", $0)
                if ($0 != "") { print $0; exit }
              }
            }
          ' "$SPEC_FILE")

          if [ -z "${PROJECT_TITLE:-}" ]; then
            PROJECT_TITLE="${{ steps.context.outputs.project_name }}"
          fi

          OWNER_LOGIN="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"

          OWNER_META=$(gh api graphql \
            -f query='query($owner: String!, $repo: String!) { repository(owner: $owner, name: $repo) { owner { __typename id login } } }' \
            -F owner="$OWNER_LOGIN" \
            -F repo="$REPO_NAME")

          OWNER_ID=$(jq -r '.data.repository.owner.id' <<< "$OWNER_META")
          OWNER_TYPE=$(jq -r '.data.repository.owner.__typename' <<< "$OWNER_META")

          if [ -z "$OWNER_ID" ] || [ "$OWNER_ID" = "null" ]; then
            echo "Unable to resolve owner ID for $OWNER_LOGIN"
            exit 1
          fi

          echo "Resolved project title: $PROJECT_TITLE"
          echo "Resolved owner: $OWNER_LOGIN ($OWNER_TYPE)"

          PROJECT_ID=""

          if [ "$OWNER_TYPE" = "Organization" ]; then
            PROJECT_LIST=$(gh api graphql \
              -f query='query($login: String!, $title: String!) { organization(login: $login) { projectsV2(first: 100, query: $title) { nodes { id title } } } }' \
              -F login="$OWNER_LOGIN" \
              -F title="$PROJECT_TITLE" 2>/dev/null || true)
            PROJECT_ID=$(jq -r --arg title "$PROJECT_TITLE" '.data.organization.projectsV2.nodes[]? | select(.title == $title) | .id' <<< "$PROJECT_LIST" | head -n1)
          else
            PROJECT_LIST=$(gh api graphql \
              -f query='query($login: String!, $title: String!) { user(login: $login) { projectsV2(first: 100, query: $title) { nodes { id title } } } }' \
              -F login="$OWNER_LOGIN" \
              -F title="$PROJECT_TITLE" 2>/dev/null || true)
            PROJECT_ID=$(jq -r --arg title "$PROJECT_TITLE" '.data.user.projectsV2.nodes[]? | select(.title == $title) | .id' <<< "$PROJECT_LIST" | head -n1)
          fi

          if [ -z "${PROJECT_ID:-}" ]; then
            echo "Creating GitHub Project: $PROJECT_TITLE"
            PROJECT_ID=$(gh api graphql \
              -f query='mutation($ownerId: ID!, $title: String!) { createProjectV2(input: { ownerId: $ownerId, title: $title }) { projectV2 { id } } }' \
              -F ownerId="$OWNER_ID" \
              -F title="$PROJECT_TITLE" \
              --jq '.data.createProjectV2.projectV2.id')
          else
            echo "Using existing project with title: $PROJECT_TITLE"
          fi

          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "null" ]; then
            echo "Failed to resolve or create project ID"
            exit 1
          fi

          BOARD_VIEW_ID=$(gh api graphql \
            -f query='query($projectId: ID!) { node(id: $projectId) { ... on ProjectV2 { views(first: 50) { nodes { id name layout } } } } }' \
            -F projectId="$PROJECT_ID" \
            --jq '.data.node.views.nodes[] | select(.layout == "BOARD_LAYOUT") | .id' 2>/dev/null || true)

          if [ -z "${BOARD_VIEW_ID:-}" ]; then
            echo "Creating Board view for project"
            gh api graphql \
              -f query='mutation($projectId: ID!) { createProjectV2View(input: { projectId: $projectId, name: "Board", layout: BOARD_LAYOUT }) { projectV2View { id } } }' \
              -F projectId="$PROJECT_ID" >/dev/null
          else
            echo "Board view already exists"
          fi

          echo "Adding repository issues to project"
          added=0
          skipped=0

          while IFS= read -r issue_node_id; do
            [ -z "$issue_node_id" ] && continue
            if gh api graphql \
              -f query='mutation($projectId: ID!, $contentId: ID!) { addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) { item { id } } }' \
              -F projectId="$PROJECT_ID" \
              -F contentId="$issue_node_id" >/dev/null 2>&1; then
              added=$((added + 1))
            else
              skipped=$((skipped + 1))
            fi
          done < <(gh api "repos/${{ github.repository }}/issues?state=all&per_page=100" --paginate --jq '.[] | select(has("pull_request") | not) | .node_id')

          echo "Project population complete. Added: $added, Skipped: $skipped"


      - name: Commit Audit Trail
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A results/copilot-progress.md results/task-plan.json
          git commit -m "chore: pipeline run ${{ steps.context.outputs.run_id }} planned" || true
          git push

      - name: Trigger Assign Tasks Workflow
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.assign_tasks_after_plan }}
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN || github.token }}
        run: |
          set -euo pipefail
          # gh workflow run assign-stage.yml --ref "${{ github.ref_name }}"
