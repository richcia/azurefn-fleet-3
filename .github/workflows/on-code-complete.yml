name: Code - Complete

on:
  workflow_call:
    secrets:
      COPILOT_GITHUB_TOKEN:
        required: false
  workflow_dispatch:

jobs:
  process-completed-code:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    env:
      READY_FOR_CODE_REVIEW_LABEL: ready-for-code-review

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure GitHub Auth
        run: |
          set -euo pipefail
          if [ -n "${{ secrets.COPILOT_GITHUB_TOKEN }}" ] && false; then
            echo "GH_TOKEN=${{ secrets.COPILOT_GITHUB_TOKEN }}" >> "$GITHUB_ENV"
          else
            echo "GH_TOKEN=${{ github.token }}" >> "$GITHUB_ENV"
          fi

      - name: Process Copilot Completed PRs
        run: |
          set -uo pipefail

          if ! gh label list --limit 1000 --json name --jq '.[].name' | grep -Fxq "$READY_FOR_CODE_REVIEW_LABEL"; then
            echo "Creating missing label: $READY_FOR_CODE_REVIEW_LABEL"
            output=$(gh label create "$READY_FOR_CODE_REVIEW_LABEL" --color "0e8a16" --description "Issue is ready for code review" 2>&1) || echo "::error::Failed to create label: $output"
          fi

          output=$(gh pr list --state open --limit 1000 --json number,isDraft,labels,closingIssuesReferences > all_open_prs.json 2>&1) || echo "::error::Failed to list pull requests: $output"

          processed_count=0
          while IFS= read -r pr_number; do
            [ -z "$pr_number" ] && continue

            copilot_work_finished=false
            output=$(gh api --paginate -H "Accept: application/vnd.github+json" \
              "repos/${{ github.repository }}/issues/$pr_number/timeline?per_page=100" \
              --jq '.[] | select(.event == "copilot_work_finished") | .event' 2>&1) || {
              echo "::error::Failed to check copilot work status for PR #$pr_number: $output"
              continue
            }
            if echo "$output" | grep -Fq "copilot_work_finished"; then
              copilot_work_finished=true
            fi

            if [ "$copilot_work_finished" != true ]; then
              continue
            fi

            echo "Copilot finished work on PR #$pr_number — processing..."

            # Step 1: Label the PR's linked issues with the review-ready label
            while IFS= read -r issue_number; do
              [ -z "$issue_number" ] && continue
              echo "  Labelling issue #$issue_number with '$READY_FOR_CODE_REVIEW_LABEL'"
              output=$(gh issue edit "$issue_number" --add-label "$READY_FOR_CODE_REVIEW_LABEL" 2>&1) || echo "::error::Failed to add label to issue #$issue_number: $output"
            done < <(jq -r --argjson pr "$pr_number" \
              '.[] | select(.number == $pr) | .closingIssuesReferences[]?.number' \
              all_open_prs.json)

            has_ready_label=$(jq -r --argjson pr "$pr_number" --arg label "$READY_FOR_CODE_REVIEW_LABEL" \
              '.[] | select(.number == $pr) | any(.labels[]?; .name == $label)' \
              all_open_prs.json)
            if [ "$has_ready_label" = "true" ]; then
              echo "  PR #$pr_number already has '$READY_FOR_CODE_REVIEW_LABEL'; skipping reviewer assignment and ready transition."
              processed_count=$((processed_count + 1))
              continue
            fi

            # Step 2: Mark PR as review-ready (undraft)
            echo "  Marking PR #$pr_number as $READY_FOR_CODE_REVIEW_LABEL"
            output=$(gh pr ready "$pr_number" 2>&1) || echo "::error::Failed to mark PR #$pr_number as ready: $output"

            # Step 3: Add Copilot as a reviewer
            echo "  Adding copilot-swe-agent[bot] as requested reviewer on PR #$pr_number"
            reviewer_response_file=$(mktemp)
            reviewer_status=$(curl -sS \
              -o "$reviewer_response_file" \
              -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${{ github.api_url }}/repos/${{ github.repository }}/pulls/$pr_number/requested_reviewers" \
              -d '{"reviewers":["copilot-swe-agent[bot]"]}' 2>&1)
            if ! [[ "$reviewer_status" =~ ^2 ]]; then
              output=$(cat "$reviewer_response_file")
              echo "::error::Failed to add copilot-swe-agent[bot] as requested reviewer to PR #$pr_number: HTTP $reviewer_status $output"
            fi
            rm -f "$reviewer_response_file"

            processed_count=$((processed_count + 1))
          done < <(jq -r '.[] | select(.isDraft == true) | .number' all_open_prs.json)

          echo "PRs processed: $processed_count"
