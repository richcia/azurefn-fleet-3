name: CD

on:
  push:
    branches:
      - main

permissions:
  id-token: write   # Required for OIDC token acquisition
  contents: read

jobs:
  deploy:
    name: Test, deploy to staging, smoke test, and swap
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: pip install -r requirements.txt

      - name: Run pytest unit tests
        run: python -m pytest tests/ -v

      - name: Install production dependencies
        run: |
          pip install \
            --target=".python_packages/lib/site-packages" \
            -r requirements-prod.txt

      - name: Create deployment zip package
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "tests/*" \
            --exclude ".github/*" \
            --exclude "infra/*" \
            --exclude "local.settings.json*" \
            --exclude "*.md" \
            --exclude "coverage.xml" \
            --exclude "deploy.zip" \
            --exclude '*__pycache__*' \
            --exclude '*.pyc'

      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy zip package to staging slot
        uses: azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          slot-name: staging
          package: deploy.zip

      - name: Smoke test staging slot by invoking timer function
        uses: azure/cli@v2
        with:
          inlineScript: |
            RESOURCE_GROUP="$(az resource list --name "${{ secrets.AZURE_FUNCTIONAPP_NAME }}" --resource-type "Microsoft.Web/sites" --query "[0].resourceGroup" -o tsv)"
            if [ -z "$RESOURCE_GROUP" ]; then
              echo "Unable to determine resource group for ${{ secrets.AZURE_FUNCTIONAPP_NAME }}"
              exit 1
            fi

            FUNCTION_NAME="${{ vars.SMOKE_TEST_FUNCTION_NAME }}"
            if [ -z "$FUNCTION_NAME" ]; then
              FUNCTION_NAME="GetAndStoreYankeesRoster"
            fi

            FUNCTION_RESOURCE_NAME="$(az functionapp function show --name "${{ secrets.AZURE_FUNCTIONAPP_NAME }}" --resource-group "$RESOURCE_GROUP" --slot staging --function-name "$FUNCTION_NAME" --query name -o tsv 2>/dev/null || true)"
            if [ -z "$FUNCTION_RESOURCE_NAME" ]; then
              echo "Function '$FUNCTION_NAME' not found in staging slot."
              exit 1
            fi
            HOSTNAME="$(az functionapp show --name "${{ secrets.AZURE_FUNCTIONAPP_NAME }}" --resource-group "$RESOURCE_GROUP" --slot staging --query defaultHostName -o tsv)"
            MASTER_KEY="$(az functionapp keys list --name "${{ secrets.AZURE_FUNCTIONAPP_NAME }}" --resource-group "$RESOURCE_GROUP" --slot staging --query masterKey -o tsv)"

            if [ -z "$HOSTNAME" ] || [ -z "$MASTER_KEY" ]; then
              echo "Unable to resolve host name or host key for staging slot."
              exit 1
            fi

            for attempt in 1 2 3 4 5 6; do
              STATUS_CODE="$(curl -sS -o /dev/null -w "%{http_code}" \
                -X POST "https://${HOSTNAME}/admin/functions/${FUNCTION_NAME}" \
                -H "Content-Type: application/json" \
                -H "x-functions-key: ${MASTER_KEY}" \
                --data '{}')"

              if [ "$STATUS_CODE" = "200" ] || [ "$STATUS_CODE" = "202" ] || [ "$STATUS_CODE" = "204" ]; then
                echo "Smoke test passed with HTTP $STATUS_CODE by invoking ${FUNCTION_NAME} on attempt ${attempt}."
                exit 0
              fi

              echo "Smoke test attempt ${attempt} failed with HTTP $STATUS_CODE. Retrying in 10 seconds..."
              sleep 10
            done

            echo "Smoke test failed after retries."
            exit 1

      - name: Swap staging slot to production
        uses: azure/cli@v2
        with:
          inlineScript: |
            RESOURCE_GROUP="$(az resource list --name "${{ secrets.AZURE_FUNCTIONAPP_NAME }}" --resource-type "Microsoft.Web/sites" --query "[0].resourceGroup" -o tsv)"
            if [ -z "$RESOURCE_GROUP" ]; then
              echo "Unable to determine resource group for ${{ secrets.AZURE_FUNCTIONAPP_NAME }}"
              exit 1
            fi

            az functionapp deployment slot swap \
              --name "${{ secrets.AZURE_FUNCTIONAPP_NAME }}" \
              --resource-group "$RESOURCE_GROUP" \
              --slot staging \
              --target-slot production
