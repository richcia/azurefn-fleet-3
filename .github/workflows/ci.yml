name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests (Python 3.11)
    if: vars.CI_ENABLED == 'true' # Disabled by default; set repository variable CI_ENABLED=true after staging validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: python -m pytest tests -v -m "not integration" --cov=. --cov-report=term-missing
