name: Assign - Assign Tasks to Agents for Implementation

on:
  workflow_call:
    inputs:
      issue_id:
        description: Optional issue number to assign directly
        required: false
        type: string
    secrets:
      COPILOT_GITHUB_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      issue_id:
        description: Optional issue number to assign directly
        required: false
        type: string

jobs:
  assign-and-execute:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      issues: write
      pull-requests: write
      contents: write

    env:
      GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN || github.token }}
      COPILOT_PROMPT: >-
        Execute all four phases end-to-end for this issue: (1) fully implement tasks, (2) build and test to green, (3) run Code Review Agent and capture findings, and (4) apply review feedback and re-test to green

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Query Code Ready Issues By Dependencies
        id: ready_issues
        run: |
          set -euo pipefail

          TARGET_ISSUE_ID="${{ inputs.issue_id }}"

          {
            gh issue list --state all --limit 1000 --json number,title,body,state,url > all_issues.json
          } 2>&1 | tee -a gh_list_output.log
          
          {
            echo "gh_list_output<<EOF"
            cat gh_list_output.log
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          : > ready_issues.txt
          : > blocked_issues.txt

          if [ -n "$TARGET_ISSUE_ID" ]; then
            if ! [[ "$TARGET_ISSUE_ID" =~ ^[0-9]+$ ]]; then
              echo "Invalid issue_id input: '$TARGET_ISSUE_ID' (expected numeric issue number)"
              exit 1
            fi

            if ! jq -e --argjson issue_number "$TARGET_ISSUE_ID" '.[] | select(.number == $issue_number)' all_issues.json > /dev/null; then
              echo "Issue #$TARGET_ISSUE_ID was not found in this repository."
              exit 1
            fi

            target_state=$(jq -r --argjson issue_number "$TARGET_ISSUE_ID" '.[] | select(.number == $issue_number) | .state' all_issues.json)
            if [ "$target_state" != "OPEN" ]; then
              echo "Issue #$TARGET_ISSUE_ID is not open (state=$target_state); skipping assignment."
              echo "ready_count=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "$TARGET_ISSUE_ID" > ready_issues.txt
            echo "ready_count=1" >> "$GITHUB_OUTPUT"
            echo "Ready issues: 1 (issue_id override)"
            exit 0
          fi

          declare -A TASK_STATE
          while IFS=$'\t' read -r task_id task_state; do
            [ -z "$task_id" ] && continue
            TASK_STATE["$task_id"]="$task_state"
          done < <(jq -r '
            .[]
            | select(.title | test("^\\[Task [^\\]]+\\]"))
            | (.title | capture("^\\[Task (?<id>[^\\]]+)\\]").id) + "\t" + .state
          ' all_issues.json)

          while IFS= read -r issue_b64; do
            issue_json=$(printf "%s" "$issue_b64" | base64 --decode)
            issue_number=$(jq -r '.number' <<< "$issue_json")
            issue_title=$(jq -r '.title' <<< "$issue_json")
            issue_state=$(jq -r '.state' <<< "$issue_json")
            issue_body=$(jq -r '.body // ""' <<< "$issue_json")

            [ "$issue_state" != "OPEN" ] && continue

            depends_section=$(printf "%s\n" "$issue_body" | awk '
              BEGIN { in_dep = 0 }
              /^## Depends On[[:space:]]*$/ { in_dep = 1; next }
              /^##[[:space:]]+/ { if (in_dep) exit }
              { if (in_dep) print }
            ')

            deps=$(printf "%s\n" "$depends_section" \
              | sed -E 's/^\s*[-*]\s*//' \
              | sed -E 's/^\[ \]\s*//' \
              | sed -E 's/^\[x\]\s*//I' \
              | sed -E 's/^Task\s+//' \
              | sed -E 's/^\[Task\s+([^\]]+)\].*$/\1/' \
              | sed -E 's/\s+$//' \
              | sed -E '/^$/d' \
              | sed -E '/^None$/I d')

            ready=true
            missing_or_open=()
            if [ -n "$deps" ]; then
              while IFS= read -r dep; do
                [ -z "$dep" ] && continue
                dep_state="${TASK_STATE[$dep]:-MISSING}"
                if [ "$dep_state" != "CLOSED" ]; then
                  ready=false
                  missing_or_open+=("$dep")
                fi
              done <<< "$deps"
            fi

            if [ "$ready" = true ]; then
              echo "$issue_number" >> ready_issues.txt
            else
              echo "$issue_number\t${missing_or_open[*]}" >> blocked_issues.txt
            fi
          done < <(jq -r '.[] | @base64' all_issues.json)

          ready_count=$(wc -l < ready_issues.txt | tr -d ' ')
          echo "ready_count=$ready_count" >> "$GITHUB_OUTPUT"
          echo "Ready issues: $ready_count"

      - name: Assign Code Ready Issues To Copilot
        if: steps.ready_issues.outputs.ready_count != '0'
        id: assign_copilot
        run: |
          set -euo pipefail

          DESIGN_ISSUES_JSON=$(jq -c --rawfile ready_file ready_issues.txt '
            ($ready_file | split("\n") | map(select(length > 0) | tonumber)) as $ready_ids
            | [ .[]
                | select((.number as $n | $ready_ids | index($n)) != null)
                | select((.body // "") | test("(?im)^-\\s*Type:\\s*design\\b"))
                | { number, url }
              ]
          ' all_issues.json)

          if jq -e 'length > 0' <<< "$DESIGN_ISSUES_JSON" > /dev/null; then
            echo "The follow design Issues must be manuallycompleted and closed before continuing:"
            echo
            jq -r '.[] | "- " + .url' <<< "$DESIGN_ISSUES_JSON"
            exit 1
          fi

          while IFS= read -r issue_number; do
            [ -z "$issue_number" ] && continue
            echo "Assigning issue #$issue_number to Copilot flow"

            already_assigned=false
            if {
              gh issue view "$issue_number" --json assignees --jq '.assignees[]?.login'
            } | grep -Eqi '^copilot$|^copilot\[bot\]$|^copilot-swe-agent\[bot\]$'; then
              already_assigned=true
            fi

            if [ "$already_assigned" = true ]; then
              echo "Issue #$issue_number is already assigned to copilot. Skipping assignment." 
            else
              assignment_payload=$(jq -n --arg repo "${{ github.repository }}" --arg instructions "$COPILOT_PROMPT" '{
                assignees: ["copilot-swe-agent[bot]"],
                agent_assignment: {
                  target_repo: $repo,
                  base_branch: "main",
                  custom_instructions: $instructions,
                  custom_agent: "code-implementor-agent",
                  model: ""
                }
              }')

              if gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${{ github.repository }}/issues/$issue_number/assignees" \
                --input - <<< "$assignment_payload"
              then
                echo "Assigned issue #$issue_number to copilot-swe-agent[bot]"
              else
                echo "Warning: Could not assign issue #$issue_number to copilot-swe-agent[bot]."
                echo "::warning title=Issue Assignment Failed::Could not assign issue #$issue_number to copilot-swe-agent[bot]"
              fi
            fi
          done < ready_issues.txt

      - name: Wait For Copilot To Finish Assigned Issues
        if: steps.ready_issues.outputs.ready_count != '0'
        run: |
          set -euo pipefail

          POLL_SECONDS=60
          TIMEOUT_SECONDS=7200

          wait_for_issue_completion() {
            local issue_number="$1"
            local start_ts
            start_ts=$(date +%s)

            echo "Waiting for Copilot to complete work for issue #$issue_number"

            while true; do
              local now_ts
              now_ts=$(date +%s)
              if [ $((now_ts - start_ts)) -ge "$TIMEOUT_SECONDS" ]; then
                echo "::error::Timed out waiting for Copilot to complete issue #$issue_number"
                return 1
              fi

              pr_json=$(gh pr list --state all --limit 1000 --json number,state,mergedAt,url,closingIssuesReferences | jq -c --argjson issue_number "$issue_number" '
                [ .[]
                  | select(any(.closingIssuesReferences[]?; .number == $issue_number))
                ]
                | sort_by(.number)
                | last // empty
              ')

              if [ -z "$pr_json" ]; then
                echo "No PR linked to issue #$issue_number yet; checking again in ${POLL_SECONDS}s"
                sleep "$POLL_SECONDS"
                continue
              fi

              pr_number=$(jq -r '.number' <<< "$pr_json")
              pr_state=$(jq -r '.state' <<< "$pr_json")
              pr_merged_at=$(jq -r '.mergedAt // empty' <<< "$pr_json")
              pr_url=$(jq -r '.url' <<< "$pr_json")

              if [ -n "$pr_merged_at" ]; then
                echo "PR #$pr_number for issue #$issue_number is merged: $pr_url"
                return 0
              fi

              copilot_finished=$(gh api --paginate -H "Accept: application/vnd.github+json" \
                "repos/${{ github.repository }}/issues/$pr_number/timeline?per_page=100" \
                --jq '.[] | select(.event == "copilot_work_finished") | .event' || true)

              if echo "$copilot_finished" | grep -Fq "copilot_work_finished"; then
                echo "Copilot finished work on PR #$pr_number for issue #$issue_number: $pr_url"
                
                # Merge the PR if it's still open
                if [ "$pr_state" = "OPEN" ]; then
                  # Mark PR as ready for review if it's still in draft
                  pr_draft=$(gh pr view "$pr_number" --json isDraft --jq '.isDraft')
                  if [ "$pr_draft" = "true" ]; then
                    echo "Marking PR #$pr_number as ready for review"
                    gh pr ready "$pr_number"
                  fi
                  
                  echo "Merging PR #$pr_number for issue #$issue_number"
                  gh pr merge "$pr_number" --merge --delete-branch
                fi
                
                return 0
              fi

              if [ "$pr_state" = "CLOSED" ]; then
                echo "::error::PR #$pr_number for issue #$issue_number was closed before Copilot finished: $pr_url"
                return 1
              fi

              echo "PR #$pr_number exists for issue #$issue_number, but Copilot is still working; checking again in ${POLL_SECONDS}s"
              sleep "$POLL_SECONDS"
            done
          }

          while IFS= read -r issue_number; do
            [ -z "$issue_number" ] && continue
            wait_for_issue_completion "$issue_number"
          done < ready_issues.txt

      - name: Re-Run Workflow While Ready Issues Remain
        if: steps.ready_issues.outputs.ready_count != '0'
        run: |
          set -euo pipefail

          echo "ready_count=${{ steps.ready_issues.outputs.ready_count }}; dispatching next run"
          gh workflow run assign-stage.yml --ref "${{ github.ref_name }}"

